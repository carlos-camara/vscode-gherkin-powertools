---
site_name: Gherkin PowerTools
site_url: https://carlos-camara.github.io/vscode-gherkin-powertools/
site_description: >
  A configurable formatter, structural linter, quick fixes,
  and Python/Behave navigation tool for Gherkin inside VS Code.
site_author: Carlos Camara
use_directory_urls: false

theme:
  name: material
  logo: assets/logo-transparent.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Configuration: configuration.md
  - Features:
      - Formatter: features/formatter.md
      - Linter: features/linter.md
      - Go To Definition: features/definition.md
      - Behave Execution: features/execution.md
      - Outline Provider: features/outline.md
      - Statistics Dashboard: features/statistics.md
      - Syntax Highlighting: features/highlighting.md
      - Autocomplete & Snippets: features/snippets.md
      - Hover Preview: features/hover.md
  - Architecture:
      - Core Architecture: ARCHITECTURE.md
      - CI/CD Pipelines: pipelines.md
  - Community:
      - Contributing: contributing.md
      - Code of Conduct: code_of_conduct.md
      - Security Policy: security.md
  - Changelog: changelog.md
