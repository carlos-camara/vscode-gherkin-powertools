name: 'Setup and Build'
description: 'Sets up Node.js, installs dependencies, and compiles TypeScript'
runs:
  using: "composite"
  steps:
    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: 📦 Install Dependencies
      shell: bash
      run: npm ci

    - name: 🔨 Compile & Build
      shell: bash
      run: npm run compile && npm run esbuild
