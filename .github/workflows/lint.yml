---
name: 🛡️ Code Quality Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Markdown & Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: 📝 Lint Markdown
        run: npx markdownlint-cli2 "**/*.md" "#node_modules"

      - name: ⚙️ Lint GitHub Actions
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint
