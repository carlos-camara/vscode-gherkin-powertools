---
name: 🛡️ Code Quality Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Compile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: ⚙️ Setup and Build
        uses: ./.github/actions/setup-build

      - name: 🧹 Lint Codebase (Markdown, YAML, Actions)
        uses: carlos-camara/qa-hub-actions/lint-codebase@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
