---
name: 📦 Create Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Release VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: ⚙️ Setup and Build
        uses: ./.github/actions/setup-build

      - name: 🧪 Validate Tests
        run: |
          xvfb-run -a npm run test
          xvfb-run -a npm run test:e2e

      - name: 🏷️ Determine Version and Tag
        id: vars
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          VSIX="gherkin-powertools-$VERSION.vsix"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"

      - name: 📦 Package VSIX
        env:
          VSIX_FILE: ${{ steps.vars.outputs.vsix }}
        run: |
          npx vsce package --out "$VSIX_FILE"
          npx vsce ls

      - name: 🛡️ Verify VSIX
        env:
          VSIX_FILE: ${{ steps.vars.outputs.vsix }}
        run: |
          if [ ! -s "$VSIX_FILE" ]; then
            echo "Error: VSIX file is missing or empty!"
            exit 1
          fi

      - name: 🏷️ Ensure Git Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists."
          else
            echo "Creating tag $TAG..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: 🚀 Ensure GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" --generate-notes
          fi

      - name: 📎 Upload VSIX Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
          VSIX_FILE: ${{ steps.vars.outputs.vsix }}
        run: |
          if gh release view "$TAG" --json assets -q ".assets[].name" | grep -qx "$VSIX_FILE"; then
            echo "Asset $VSIX_FILE already uploaded to release $TAG."
          else
            echo "Uploading asset $VSIX_FILE to release $TAG..."
            gh release upload "$TAG" "$VSIX_FILE" --clobber
          fi

      - name: 🌐 Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VSIX_FILE: ${{ steps.vars.outputs.vsix }}
        run: |
          echo "Publishing to Visual Studio Marketplace..."
          # By passing the pre-packaged VSIX (-i), we prevent vsce from re-running 
          # the build scripts (prepublish) while the PAT is exposed in the environment.
          npx vsce publish -i "$VSIX_FILE"
