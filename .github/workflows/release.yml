---
name: 📦 Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release VSIX
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Compile TypeScript
        run: npm run compile

      - name: 📦 Package VSIX
        run: npx -y @vscode/vsce package --out gherkin-beautifier-${GITHUB_REF_NAME#v}.vsix

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: gherkin-beautifier-*.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
