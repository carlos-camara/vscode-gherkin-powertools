---
name: 📦 Create Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Release VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: ⚙️ Setup and Build
        uses: ./.github/actions/setup-build

      - name: 🧪 Validate Tests
        run: |
          xvfb-run -a npm run test
          xvfb-run -a npm run test:e2e

      - name: 🏷️ Determine Version and Tag
        id: vars
        run: |
          VERSION=$(jq -r '.version' package.json | tr -d '\n\r')
          TAG="v$VERSION"
          VSIX="gherkin-powertools-$VERSION.vsix"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"

      - name: 📦 Package VSIX
        env:
          VSIX_FILE: ${{ steps.vars.outputs.vsix }}
        run: |
          ./node_modules/.bin/vsce package --out "$VSIX_FILE"
          ./node_modules/.bin/vsce ls

      - name: 🛡️ Verify VSIX
        env:
          VSIX_FILE: ${{ steps.vars.outputs.vsix }}
        run: |
          if [ ! -s "$VSIX_FILE" ]; then
            echo "Error: VSIX file is missing or empty!"
            exit 1
          fi

      - name: 🏷️ Ensure Git Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -Fq "$TAG"; then
            printf "Tag %s already exists.\n" "$TAG"
          else
            printf "Creating tag %s...\n" "$TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -- "$TAG"
            git push origin "refs/tags/$TAG"
          fi

      - name: 🚀 Ensure GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          if gh release view -- "$TAG" > /dev/null 2>&1; then
            printf "Release %s already exists.\n" "$TAG"
          else
            printf "Creating release %s...\n" "$TAG"
            gh release create -- "$TAG" --generate-notes
          fi

      - name: 📎 Upload VSIX Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.vars.outputs.tag }}
          VSIX_FILE: ${{ steps.vars.outputs.vsix }}
        run: |
          if gh release view -- "$TAG" --json assets -q ".assets[].name" | grep -Fqx "$VSIX_FILE"; then
            printf "Asset %s already uploaded to release %s.\n" "$VSIX_FILE" "$TAG"
          else
            printf "Uploading asset %s to release %s...\n" "$VSIX_FILE" "$TAG"
            gh release upload -- "$TAG" "$VSIX_FILE" --clobber
          fi

      - name: 🌐 Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VSIX_FILE: ${{ steps.vars.outputs.vsix }}
        run: |
          echo "Publishing to Visual Studio Marketplace..."
          # By passing the pre-packaged VSIX (-i), we prevent vsce from re-running 
          # the build scripts (prepublish) while the PAT is exposed in the environment.
          # We use the direct path to the binary to prevent package.json script hijacking via npx.
          ./node_modules/.bin/vsce publish -i "$VSIX_FILE"
