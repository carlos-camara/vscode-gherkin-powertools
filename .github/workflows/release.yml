---
name: 📦 Create Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Release VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: ⚙️ Setup and Build
        uses: ./.github/actions/setup-build

      - name: 🧪 Validate Tests
        run: |
          xvfb-run -a npm run test
          xvfb-run -a npm run test:e2e

      - name: 🏷️ Determine Version and Tag
        id: vars
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          VSIX="gherkin-powertools-$VERSION.vsix"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "vsix=$VSIX" >> "$GITHUB_OUTPUT"

      - name: 📦 Package VSIX
        run: |
          npx vsce package --out ${{ steps.vars.outputs.vsix }}
          npx vsce ls

      - name: 🛡️ Verify VSIX
        run: |
          if [ ! -s "${{ steps.vars.outputs.vsix }}" ]; then
            echo "Error: VSIX file is missing or empty!"
            exit 1
          fi

      - name: 🏷️ Ensure Git Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists."
          else
            echo "Creating tag $TAG..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: 🚀 Ensure GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          
          # Extract release notes for this specific version
          node -e "
          const fs = require('fs');
          const version = require('./package.json').version;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const lines = changelog.split('\n');
          let capturing = false;
          let notes = [];
          for (const line of lines) {
            if (line.startsWith('## [' + version + ']')) {
              capturing = true;
              continue;
            }
            if (capturing && line.startsWith('## [')) break;
            if (capturing) notes.push(line);
          }
          fs.writeFileSync('release_notes.md', notes.join('\n').trim());
          "

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" --notes-file release_notes.md
          fi

      - name: 📎 Upload VSIX Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          VSIX="${{ steps.vars.outputs.vsix }}"
          if gh release view "$TAG" --json assets -q ".assets[].name" | grep -qx "$VSIX"; then
            echo "Asset $VSIX already uploaded to release $TAG."
          else
            echo "Uploading asset $VSIX to release $TAG..."
            gh release upload "$TAG" "$VSIX" --clobber
          fi
