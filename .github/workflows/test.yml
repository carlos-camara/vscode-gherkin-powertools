---
name: 🧪 Run Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Compile TypeScript
        run: npm run compile

      - name: 🧪 Run Tests & Generate Coverage
        run: xvfb-run -a npm run coverage

      - name: 📊 Report Coverage to PR
        uses: carlos-camara/qa-hub-actions/report-coverage@feat/report-coverage-action
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}
