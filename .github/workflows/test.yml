---
name: 🧪 Run Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'mkdocs.yml'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: read
  # Required for report-coverage to update the PR comment
  pull-requests: write
  # Required for publish-unit-test-result-action to post check runs
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: ⚙️ Setup and Build
        uses: ./.github/actions/setup-build

      - name: 🧪 Run Tests & Generate Coverage (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run coverage

      - name: 🧪 Run Tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm test

      - name: 📊 Report Coverage to PR
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        uses: carlos-camara/qa-hub-actions/report-coverage@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}

      - name: 📝 Publish Unit Test Results (Linux)
        if: >
          always() &&
          runner.os == 'Linux' &&
          github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/**/*.xml"
          check_name: "Unit Test Results (${{ matrix.os }})"
          comment_mode: off
          check_run: true

      - name: 📝 Publish Unit Test Results (Windows)
        if: >
          always() &&
          runner.os == 'Windows' &&
          github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        with:
          files: 'test-results/**/*.xml'
          check_name: "Unit Test Results (${{ matrix.os }})"
          comment_mode: off
          check_run: true

      - name: 📝 Publish Unit Test Results (macOS)
        if: >
          always() &&
          runner.os == 'macOS' &&
          github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        with:
          files: "test-results/**/*.xml"
          check_name: "Unit Test Results (${{ matrix.os }})"
          comment_mode: off
          check_run: true
