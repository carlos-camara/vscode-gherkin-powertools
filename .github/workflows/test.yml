---
name: 🧪 Run Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: ⚙️ Setup and Build
        uses: ./.github/actions/setup-build

      - name: 🧪 Run Tests & Generate Coverage (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run coverage

      - name: 🧪 Run Tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm run test

      - name: 📤 Upload Coverage Artifact
        if: runner.os == 'Linux' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: 📝 Publish Unit Test Results
        if: always() && runner.os == 'Linux' && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/unit-test-results.xml"
          check_name: "Unit Test Results"
          comment_title: "🧪 Unit Test Execution Results"
          check_run: false
