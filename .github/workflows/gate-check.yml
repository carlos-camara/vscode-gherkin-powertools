---
name: 🚦 PR Hygiene & Intelligence Gate

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  gate:
    name: PR Gate Check
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: 📝 PR Hygiene Validator
        uses: carlos-camara/qa-hub-actions/pr-hygiene-validator@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🤖 AI PR Summarizer
        uses: carlos-camara/qa-hub-actions/pr-summarizer@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
