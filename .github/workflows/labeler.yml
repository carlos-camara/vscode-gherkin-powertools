---
name: 🏷️ PR Labeler

on:
  pull_request_target:

jobs:
  label:
    name: Auto Labeler
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 🏷️ PR Labeler
        uses: carlos-camara/qa-hub-actions/pr-labeler@main
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📏 PR Size Labeler
        uses: carlos-camara/qa-hub-actions/pr-size-labeler@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
