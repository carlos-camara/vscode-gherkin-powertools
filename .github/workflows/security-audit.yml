---
name: 🛡️ Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 3 * * *' # Run at 03:00 AM every day

permissions:
  contents: read
  pull-requests: read

jobs:
  audit:
    name: Node.js Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=high
