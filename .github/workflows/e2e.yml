---
name: 🧪 E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run E2E UI Tests
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Compile TypeScript
        run: npm run compile

      - name: 💾 Cache VS Code Test Binaries
        uses: actions/cache@v4
        with:
          path: .vscode-test
          key: ${{ runner.os }}-vscode-test-${{ hashFiles('package-lock.json') }}

      - name: 🎭 Run End-to-End Tests
        # xvfb-run creates a virtual X server display, required
        # for VS Code UI tests on Linux runners
        run: xvfb-run -a npm run test:e2e

      - name: 🧹 Delete Old PR Comments (Push to Bottom)
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          COMMENT_IDS=$(gh api "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.type == "Bot") | select(.body | contains("Test Execution Results")) | .id')
          for ID in $COMMENT_IDS; do
            gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$ID"
          done || true

      - name: 📝 Publish E2E Test Results
        if: always() && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/e2e-test-results.xml"
          check_name: "E2E Test Results"
          comment_title: "🎭 End-to-End Test Execution Results"
          check_run: false
