---
name: 🧪 E2E Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write # Required for publish-unit-test-result-action to post check runs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run E2E UI Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: ⚙️ Setup and Build
        uses: ./.github/actions/setup-build

      - name: 💾 Cache VS Code Test Binaries
        uses: actions/cache@v6
        with:
          path: .vscode-test
          key: ${{ runner.os }}-${{ runner.arch }}-vscode-test-${{ hashFiles('package-lock.json') }}

      - name: 🎭 Run End-to-End Tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm run test:e2e

      - name: 🎭 Run End-to-End Tests (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm run test:e2e

      - name: 📝 Publish E2E Test Results
        if: always() && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/e2e-test-results.xml"
          check_name: "E2E Test Results"
          comment_mode: off
          check_run: true
