---
name: 🧪 E2E Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: write

jobs:
  e2e:
    name: Run E2E UI Tests
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔨 Compile TypeScript
        run: npm run compile

      - name: 🎭 Run End-to-End Tests
        # xvfb-run creates a virtual X server display, required for VS Code UI tests on Linux runners
        run: xvfb-run -a npm run test:e2e

      - name: 📝 Publish E2E Test Results
        if: always() && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/e2e-test-results.xml"
          check_name: "E2E Test Results"
          comment_title: "🎭 End-to-End Test Execution Results"
