---
name: 🧪 E2E Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run E2E UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 🔍 Checkout Code
        uses: actions/checkout@v7

      - name: ⚙️ Setup and Build
        uses: ./.github/actions/setup-build

      - name: 💾 Cache VS Code Test Binaries
        uses: actions/cache@v6
        with:
          path: .vscode-test
          key: ${{ runner.os }}-vscode-test-${{ hashFiles('package-lock.json') }}

      - name: 🎭 Run End-to-End Tests
        run: xvfb-run -a npm run test:e2e

      - name: 📝 Publish E2E Test Results
        if: always() && github.event_name == 'pull_request'
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: "test-results/e2e-test-results.xml"
          check_name: "E2E Test Results"
          comment_title: "🎭 End-to-End Test Execution Results"
          check_run: false
